<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #f8fafc;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .header { max-width: 1000px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .card { max-width: 1000px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); overflow: hidden; }
        
        select { padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; cursor: pointer; background: white; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        
        tr:hover { background-color: #f8fafc; }
        
        /* Conditional Formatting */
        .status-low { background-color: #fee2e2; color: var(--danger); font-weight: 600; border-radius: 4px; padding: 2px 8px; display: inline-block; }
        .status-ok { color: var(--success); font-weight: 600; }
        
        .loader { padding: 40px; text-align: center; color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <h1>Class Records</h1>
    <select id="sheetSelector" onchange="loadData()">
        <option value="0">📅 Attendance</option>
        <option value="538873744">🧪 EXP 1</option>
        <option value="1743911233">🧪 EXP 2</option>
        <option value="735020452">🧪 EXP 3</option>
        <option value="132790111">🧪 EXP 4</option>
        <option value="1403681896">🧪 EXP 5</option>
        <option value="960396706">🧪 EXP 6</option>
        <option value="657786847">🧪 EXP 7</option>
        <option value="912535418">🧪 EXP 8</option>
        <option value="821022304">🧪 EXP 9</option>
        <option value="972789350">🧪 EXP 10</option>
        <option value="1609104477">📊 Average Marks</option>
    </select>
</div>

<div class="card" id="mainCard">
    <div id="tableContainer" class="loader">Select a sheet to begin...</div>
</div>

<script>
    const base = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQEvjAT5yBEs8T6di8jzkoQiPQdLUHieuruRzluxmq5Vy9N-u5EesxB9UQgWdGrTDmsZB8r6xBxlNAA/pub?output=csv";

    async function loadData() {
        const gid = document.getElementById('sheetSelector').value;
        const container = document.getElementById('tableContainer');
        container.innerHTML = "Fetching latest data from Google Sheets...";

        try {
            const response = await fetch(`${base}&gid=${gid}`);
            const data = await response.text();
            renderCSV(data, gid);
        } catch (err) {
            container.innerHTML = "Error loading data. Make sure the sheet is published to web.";
        }
    }

    function renderCSV(csv, gid) {
        const rows = csv.split('\n').filter(row => row.trim() !== '').map(row => row.split(','));
        if (rows.length === 0) return;

        // Threshold logic: Attendance (GID 0) is 75, others are 10
        const isAttendance = (gid === "0");
        const threshold = isAttendance ? 75 : 10;

        let tableHtml = '<table><thead><tr>';
        rows[0].forEach(header => tableHtml += `<th>${header}</th>`);
        tableHtml += '</tr></thead><tbody>';

        for (let i = 1; i < rows.length; i++) {
            tableHtml += '<tr>';
            rows[i].forEach((cell, index) => {
                let content = cell.trim();
                let numeric = parseFloat(content.replace('%', ''));
                let style = "";

                // Apply colors only to numeric data columns (assuming index 0 is Name/ID)
                if (index > 0 && !isNaN(numeric)) {
                    if (numeric < threshold) {
                        style = 'class="status-low"';
                    } else {
                        style = 'class="status-ok"';
                    }
                }
                tableHtml += `<td><span ${style}>${content}</span></td>`;
            });
            tableHtml += '</tr>';
        }

        tableHtml += '</tbody></table>';
        document.getElementById('tableContainer').innerHTML = tableHtml;
    }

    // Auto-load attendance on start
    window.onload = loadData;
</script>

</body>
</html>
