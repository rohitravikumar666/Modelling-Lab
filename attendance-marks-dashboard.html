<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance and Marks Dashboard</title>
    <script>
        function refreshData() {
            // Logic to fetch data from the Google Sheet CSV
            fetchDataFromCSV(); // Placeholder for actual fetch logic
            updateLastUpdated();
        }

        function updateLastUpdated() {
            const now = new Date().toUTCString();
            document.getElementById('lastUpdated').innerText = 'Last Updated: ' + now;
        }

        setInterval(refreshData, 30000); // Refresh data every 30 seconds
    </script>
</head>
<body onload="refreshData()">
    <h1>Attendance and Marks Dashboard</h1>
    <div id="dataDisplay">
        <!-- Data from Google Sheet CSV will be displayed here -->
    </div>
    <button onclick="refreshData()">Refresh</button>
    <div id="lastUpdated">Last Updated: 2026-03-14 16:07:58</div>
</body>
</html>
